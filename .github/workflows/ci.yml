name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Build & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Uses the version pinned in package.json's `packageManager` field.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # Fails if pnpm-lock.yaml is out of sync with package.json.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails on Prettier formatting drift.
      - name: Check formatting
        run: pnpm format:check

      # ESLint (eslint-plugin-astro + typescript-eslint) over .astro/.ts/.js.
      - name: Lint
        run: pnpm lint

      # Type-checks .astro/.ts files via astro check (tsc + the Astro language
      # server). Catches the kind of `string | undefined` and bad-prop errors
      # that a plain build does not.
      - name: Type check
        run: pnpm check

      # Compiles .astro files and content, and generates RSS, sitemap,
      # llms.txt and the Open Graph images.
      - name: Build
        run: pnpm build
